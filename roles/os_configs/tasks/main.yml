---
- name: Enable HighAvailability repository
  ansible.builtin.command: dnf config-manager --set-enabled highavailability
  register: repo_enable
  changed_when: "'enabling' in repo_enable.stdout | lower"
  failed_when: repo_enable.rc != 0 and 'No such command' not in repo_enable.stderr

- name: Install HA required packages
  ansible.builtin.dnf:
    name:
      - pcs
      - pacemaker
      - corosync
    state: present

- name: Enable and start pcsd service
  ansible.builtin.systemd:
    name: pcsd
    state: started
    enabled: yes

- name: Set password for hacluster user
  ansible.builtin.user:
    name: hacluster
    password: "{{ hacluster_password | password_hash('sha512') }}"
