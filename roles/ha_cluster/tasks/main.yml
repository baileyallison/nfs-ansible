---
- name: Authenticate cluster nodes
  ansible.builtin.command: >
    pcs host auth {{ groups['nfs'] | join(' ') }} -u hacluster -p '{{ hacluster_password }}'
  run_once: true
  register: pcs_auth
  changed_when: "'Authorized' in pcs_auth.stdout"

- name: Check if cluster is already configured
  ansible.builtin.stat:
    path: /etc/corosync/corosync.conf
  register: corosync_conf

- name: Setup the cluster with multi-ring addresses
  ansible.builtin.command: >
    pcs cluster setup {{ cluster_name }}
    {% for node in cluster_nodes %}
    {{ node.name }}
    {% for ring in node.rings %}
    {{ ring.ip }}
    {% endfor %}
    {% endfor %}
  run_once: true
  when: not corosync_conf.stat.exists

- name: Start the cluster
  ansible.builtin.command: pcs cluster start --all
  run_once: true
  register: cluster_start
  changed_when: "'Starting' in cluster_start.stdout"

- name: Enable the cluster to start on boot
  ansible.builtin.command: pcs cluster enable --all
  run_once: true
  register: cluster_enable
  changed_when: false

- name: Set cluster properties
  ansible.builtin.command: pcs property set {{ item.key }}={{ item.value }}
  run_once: true
  loop: "{{ cluster_properties | dict2items }}"
  register: pcs_props
  changed_when: false

- name: Verify corosync.conf contains all ring addresses
  ansible.builtin.shell: |
    for ring_idx in $(seq 0 {{ cluster_nodes[0].rings | length - 1 }}); do
      grep -q "ring${ring_idx}_addr" /etc/corosync/corosync.conf && echo "ring${ring_idx}: OK" || echo "ring${ring_idx}: MISSING"
    done
  run_once: true
  register: ring_verify
  changed_when: false

- name: Display ring verification results
  ansible.builtin.debug:
    msg: "{{ ring_verify.stdout_lines }}"
  run_once: true

- name: Verify cluster status
  ansible.builtin.command: pcs cluster status
  run_once: true
  register: cluster_status
  changed_when: false

- name: Display cluster status
  ansible.builtin.debug:
    msg: "{{ cluster_status.stdout_lines }}"
  run_once: true
