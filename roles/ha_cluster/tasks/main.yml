---
- name: Authenticate cluster nodes
  ansible.builtin.command: >
    pcs host auth {{ groups['nfs'] | join(' ') }} -u hacluster -p '{{ hacluster_password }}'
  run_once: true
  register: pcs_auth
  changed_when: "'Authorized' in pcs_auth.stdout"

- name: Check if cluster is already configured
  ansible.builtin.stat:
    path: /etc/corosync/corosync.conf
  register: corosync_conf

- name: Setup the cluster
  ansible.builtin.command: pcs cluster setup {{ cluster_name }} {{ groups['nfs'] | join(' ') }}
  run_once: true
  when: not corosync_conf.stat.exists

- name: Update corosync.conf ringaddr to use IP addresses
  ansible.builtin.replace:
    path: /etc/corosync/corosync.conf
    regexp: 'ring{{ ring_index }}_addr:\s*{{ ansible_hostname }}'
    replace: 'ring{{ ring_index }}_addr: {{ node_rings[ring_index].ip }}'
  loop: "{{ (cluster_nodes | selectattr('name', 'equalto', ansible_hostname) | first).rings | enumerate }}"
  loop_control:
    loop_var: ring_item
  vars:
    ring_index: "{{ ring_item[0] }}"
    node_rings: "{{ (cluster_nodes | selectattr('name', 'equalto', ansible_hostname) | first).rings }}"
  when: not corosync_conf.stat.exists
  notify: restart corosync

- name: Start the cluster
  ansible.builtin.command: pcs cluster start --all
  run_once: true
  register: cluster_start
  changed_when: "'Starting' in cluster_start.stdout"

- name: Enable the cluster to start on boot
  ansible.builtin.command: pcs cluster enable --all
  run_once: true
  register: cluster_enable
  changed_when: false

- name: Set cluster properties
  ansible.builtin.command: pcs property set {{ item.key }}={{ item.value }}
  run_once: true
  loop: "{{ cluster_properties | dict2items }}"
  register: pcs_props
  changed_when: false
