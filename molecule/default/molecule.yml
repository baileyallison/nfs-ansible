---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: vagrant
  provider:
    name: libvirt

platforms:
  - name: nfs-node-1
    box: generic/rocky9
    memory: 1024
    cpus: 1
    groups:
      - nfs
    interfaces:
      - network_name: private_network
        ip: 192.168.56.10

  - name: nfs-node-2
    box: generic/rocky9
    memory: 1024
    cpus: 1
    groups:
      - nfs
    interfaces:
      - network_name: private_network
        ip: 192.168.56.11

provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
  inventory:
    group_vars:
      nfs:
        cluster_name: test-nfs-cluster
        hacluster_password: TestPassword123
        virtual_ip: 192.168.56.100
        virtual_ip_cidr: 24
        virtual_ip_nic: eth1
        nfs_shared_device: /dev/null
        nfs_mount_point: /srv/nfs
        nfs_export_path: /srv/nfs/share
        nfs_export_options: "*(rw,sync,no_root_squash)"
        firewall_services:
          - high-availability
          - nfs
          - mountd
          - rpc-bind

verifier:
  name: ansible

scenario:
  name: default
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy